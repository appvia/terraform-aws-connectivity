---
name: Terraform
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  examples:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@1199d20d99f1557a6e4984a94eb6c47a36f365e8 # main
    name: Module Examples
    with:
      working-directory: examples/inspection

  module-inspection:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@1199d20d99f1557a6e4984a94eb6c47a36f365e8 # main
    name: Inspection Connectivity
    with:
      working-directory: modules/inspection

  module-trusted:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@1199d20d99f1557a6e4984a94eb6c47a36f365e8 # main
    name: Trusted Connectivity
    with:
      working-directory: modules/trusted
