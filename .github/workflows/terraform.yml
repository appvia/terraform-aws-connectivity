---
name: Terraform
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  examples:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@14fa0378853fce002f4893d538c0cfd4aff8dfda # main
    name: Module Examples
    with:
      working-directory: examples/inspection

  module-inspection:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@14fa0378853fce002f4893d538c0cfd4aff8dfda # main
    name: Inspection Connectivity
    with:
      working-directory: modules/inspection

  module-trusted:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@14fa0378853fce002f4893d538c0cfd4aff8dfda # main
    name: Trusted Connectivity
    with:
      working-directory: modules/trusted
